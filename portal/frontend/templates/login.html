<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MorphIQ Portal — Login</title>
  <link rel="stylesheet" href="../static/css/portal.css" />
</head>
<body class="login-page">
  <main>
    <section class="login-card">
      <header class="login-header">
        <div class="login-logo">MorphIQ</div>
        <h1 class="login-title">Client Portal</h1>
        <p class="login-subtitle">Sign in to access property documents and compliance insights.</p>
      </header>

      <form class="login-form" method="post" action="/login">
        <label class="login-field-label" for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          required
          class="login-input"
          placeholder="you@company.co.uk"
        />

        <label class="login-field-label" for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          class="login-input"
          placeholder="Enter your password"
        />

        <button type="submit" class="login-button">
          <span>Sign In</span>
        </button>
      </form>

      <p class="login-footer">
        MorphIQ Portal &mdash; <strong>Private access only</strong>.
      </p>
    </section>
  </main>
</body>
</html>
